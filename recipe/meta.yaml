{% set name = "dython" %}
{% set version = "0.7.11" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: f8e7bdb05fafe21c9cd2e146222f49c4864c07723f7c2e1cf848a03b3a6937d1

build:
  number: 0
  noarch: python
  script:
    - echo $PKG_VERSION > VERSION  # [not win]
    - cp ${RECIPE_DIR}/DESCRIPTION.md .  # [not win]
    - echo %PKG_VERSION% > VERSION  # [win]
    - copy %RECIPE_DIR%\DESCRIPTION.md .  # [win]
    - {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - matplotlib-base >=3.6.0
    - numpy >=1.23.0
    - pandas >=1.4.2
    - psutil >=5.9.1
    - python >={{ python_min }}
    - scikit-learn >=0.24.2
    #- scikit-plot >=0.3.7
    - scipy >=1.15.3
    - seaborn >=0.12.0

test:
  imports:
    - dython
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: http://shakedzy.xyz/dython
  summary: A set of data tools in Python
  license: BSD-3-Clause
  license_file: LICENSE
  doc_url: http://shakedzy.xyz/dython/getting_started/installation/
  dev_url: http://shakedzy.xyz/dython/modules/data_utils/

extra:
  recipe-maintainers:
    - sarthakpati
