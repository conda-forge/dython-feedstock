{% set name = "dython" %}
{% set version = "0.7.12" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 79d093ebd37ff97eb592840176b047576bd7412819076924eca2e1aefc20e784

build:
  number: 0
  noarch: python
  script:
    - echo $PKG_VERSION > VERSION  # [not win]
    - cp ${RECIPE_DIR}/DESCRIPTION.md .  # [not win]
    - echo %PKG_VERSION% > VERSION  # [win]
    - copy %RECIPE_DIR%\DESCRIPTION.md .  # [win]
    - {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - matplotlib-base >=3.10.6
    - numpy >=2.2.6
    - pandas >=2.3.3
    - psutil >=7.1.0
    - python >={{ python_min }}
    - scikit-learn >=1.7.2
    #- scikit-plot >=0.3.7
    - scipy >=1.15.3
    - seaborn >=0.13.2

test:
  imports:
    - dython
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: http://shakedzy.xyz/dython
  summary: A set of data tools in Python
  license: BSD-3-Clause
  license_file: LICENSE
  doc_url: http://shakedzy.xyz/dython/getting_started/installation/
  dev_url: http://shakedzy.xyz/dython/modules/data_utils/

extra:
  recipe-maintainers:
    - sarthakpati
